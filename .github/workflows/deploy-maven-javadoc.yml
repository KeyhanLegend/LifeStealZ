name: Deploy Maven Javadocs to GitHub Pages

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # ✅ دسترسی نوشتن برای Deploy
      pages: write     # ✅ دسترسی Pages
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4  # ✅ نسخه 4

      - name: Set up JDK
        uses: actions/setup-java@v4  # ✅ نسخه 4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Cache Maven repository
        uses: actions/cache@v4  # ✅ نسخه 4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Build Javadocs
        run: mvn clean javadoc:javadoc

      - name: Create CNAME file
        run: |
          # ✅ ایجاد پوشه اگر وجود ندارد
          mkdir -p target/site/apidocs
          echo "jd.lsz.zetaplugins.com" > target/site/apidocs/CNAME

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4  # ✅ نسخه 4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: target/site/apidocs  # ✅ مسیر استانداردتر
          keep_files: false
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'
